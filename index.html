<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniFi Gateway Monitor</title>
    <style>
        :root { --crit: #ff3b30; --warn: #ffcc00; --good: #4cd964; --bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .harvest-time { font-size: 1.2rem; font-weight: bold; color: #00A1E4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 12px; background: var(--card-bg); border-left: 10px solid; transition: 0.3s; height: fit-content; }
        .Red { border-color: var(--crit); }
        .Yellow { border-color: var(--warn); }
        .Green { border-color: var(--good); opacity: 0.7; }
        .site-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .issue-item { margin-bottom: 8px; padding: 10px 12px; border-radius: 4px; border-left: 4px solid; }
        .sev-critical { border-left-color: var(--crit); background: rgba(255, 59, 48, 0.08); }
        .sev-warning { border-left-color: var(--warn); background: rgba(255, 204, 0, 0.05); }
        .instruction-box { display: flex; justify-content: space-between; align-items: center; }
        .instruction { font-size: 0.9rem; font-weight: bold; }
        .srv-time { font-size: 0.8rem; opacity: 0.7; }

        /* Inventory Dropdown Styles */
        details { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; cursor: pointer; }
        summary { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        .inv-list { margin-top: 10px; font-size: 0.8rem; }
        .inv-row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .inv-row .status { font-weight: bold; }
        .status-CONNECTED { color: var(--good); }
        .status-OFFLINE { color: var(--crit); }
    </style>
</head>
<body>
    <div class="header-container">
        <h1 style="margin:0; color:#444; letter-spacing:3px;">UNIFI SITE MONITOR</h1>
        <div style="text-align:right">
            <div id="harvest-clock" class="harvest-time">--:--:--</div>
            <div style="font-size:0.7rem; color:#666; text-transform:uppercase;">Last API Harvest</div>
        </div>
    </div>
    <div id="grid" class="grid">Awaiting Data...</div>
    <script>
        async function update() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const raw = await res.json();
                document.getElementById('harvest-clock').innerText = raw.timestamp || '--:--:--';
                if (!raw.sites) return;
                document.getElementById('grid').innerHTML = raw.sites.map(site => `
                    <div class="card ${site.Status}">
                        <div class="site-name">${site.SiteName}</div>
                        <div class="issue-list">
                            ${site.Status === 'Green' ? '<div style="color:var(--good); font-size:0.8rem;">✓ Site Healthy</div>' : 
                                site.IssuesList.map(issue => `
                                    <div class="issue-item sev-${issue.severity}">
                                        <div class="instruction-box">
                                            <span class="instruction">${issue.label}</span>
                                            <span class="srv-time">${issue.time || ''}</span>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                        <details>
                            <summary>View Device Inventory (${site.Inventory.length})</summary>
                            <div class="inv-list">
                                ${site.Inventory.map(item => `
                                    <div class="inv-row">
                                        <span>${item.name} <small style="color:#666">(${item.model})</small></span>
                                        <span class="status status-${item.status}">${item.status}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
        setInterval(update, 30000); update();
    </script>
</body>
</html>
