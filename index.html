<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniFi Gateway Monitor</title>
    <style>
        :root { --crit: #ff3b30; --warn: #ffcc00; --good: #4cd964; --stale: #444444; --bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .clock-box { text-align: right; }
        .harvest-time { font-size: 1.2rem; font-weight: bold; color: #00A1E4; }
        .harvest-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 12px; background: var(--card-bg); border-left: 10px solid; transition: 0.3s; }
        .Red { border-color: var(--crit); }
        .Yellow { border-color: var(--warn); }
        .Green { border-color: var(--good); opacity: 0.6; }
        
        .device-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .status-meta { font-size: 0.85rem; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .issue-item { margin-bottom: 8px; padding: 10px 12px; border-radius: 4px; border-left: 4px solid; }
        .sev-critical { border-left-color: var(--crit); background: rgba(255, 59, 48, 0.08); }
        .sev-warning { border-left-color: var(--warn); background: rgba(255, 204, 0, 0.05); }
        .sev-stale { border-left-color: var(--stale); background: rgba(255, 255, 255, 0.02); }

        .instruction-box { display: flex; justify-content: space-between; align-items: center; }
        .instruction { font-size: 0.9rem; font-weight: bold; }
        .srv-time { font-size: 0.8rem; opacity: 0.7; }
        .sev-stale .instruction { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1 style="margin:0; color:#444; letter-spacing:3px;">UNIFI GATEWAY MONITOR</h1>
        <div class="clock-box">
            <div id="harvest-clock" class="harvest-time">--:--:--</div>
            <div class="harvest-label">Last API Harvest</div>
        </div>
    </div>

    <div id="grid" class="grid">Awaiting Data...</div>

    <script>
        async function update() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const raw = await res.json();
                
                const data = raw.devices;
                document.getElementById('harvest-clock').innerText = raw.timestamp || new Date().toLocaleTimeString();

                if (!data || data.length === 0) {
                    document.getElementById('grid').innerHTML = "<div style='grid-column:1/-1;text-align:center;color:#666;'>No data or check API Key...</div>";
                    return;
                }

                document.getElementById('grid').innerHTML = data.map(dev => `
                    <div class="card ${dev.Status}">
                        <div class="device-name">${dev.DeviceName}</div>
                        <div class="status-meta">${dev.Model}</div>
                        <div class="issue-list">
                            ${dev.Status === 'Green' ? '<div style="color:var(--good); font-size:0.8rem;">✓ Online</div>' : 
                                dev.IssuesList.map(issue => `
                                    <div class="issue-item sev-${issue.severity}">
                                        <div class="instruction-box">
                                            <span class="instruction">${issue.label}</span>
                                            <span class="srv-time">${issue.time || ''}</span>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
        setInterval(update, 30000); update();
    </script>
</body>
</html>
